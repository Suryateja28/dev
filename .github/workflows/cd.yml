name: deploy to aws ec2

on:
  workflow_run:
    workflows: ["Docker Image CI"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Pull latest image
        run: sudo docker pull suryateja28/dev:latest

      - name: Delete old container
        run: sudo docker rm -f dev || true

      - name: Run new container
        run: sudo docker run -d -p 80:80 --name dev suryateja28/dev:latest